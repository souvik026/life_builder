<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Growth sprout - pixel art style -->
  <rect width="400" height="300" fill="#f7fcf9"/>
  <!-- Pot - pixel art -->
  <g fill="#4a7c59">
    <rect x="160" y="240" width="80" height="20"/>
    <rect x="170" y="220" width="60" height="20"/>
    <rect x="165" y="260" width="70" height="10"/>
  </g>
  <!-- Soil -->
  <rect x="170" y="215" width="60" height="8" fill="#2d5e3a" rx="2"/>
  <!-- Stem -->
  <rect x="197" y="140" width="6" height="75" fill="#3d8b63"/>
  <!-- Leaves - pixel art -->
  <g fill="#4a7c59">
    <!-- Left leaf -->
    <rect x="177" y="170" width="20" height="6"/>
    <rect x="171" y="164" width="12" height="6"/>
    <!-- Right leaf -->
    <rect x="203" y="155" width="20" height="6"/>
    <rect x="217" y="149" width="12" height="6"/>
  </g>
  <!-- Sprout top -->
  <g fill="#7fb08c">
    <rect x="187" y="130" width="10" height="10"/>
    <rect x="203" y="130" width="10" height="10"/>
    <rect x="190" y="120" width="8" height="10"/>
    <rect x="202" y="120" width="8" height="10"/>
    <rect x="195" y="112" width="10" height="8"/>
  </g>
  <!-- Decorative dots -->
  <g fill="#d0e0d5">
    <circle cx="60" cy="60" r="20"/>
    <circle cx="340" cy="50" r="15"/>
    <circle cx="50" cy="200" r="12"/>
    <circle cx="350" cy="180" r="18"/>
  </g>
  <!-- Small sparkle pixels -->
  <g fill="#7fb08c" opacity="0.4">
    <rect x="140" y="90" width="6" height="6"/>
    <rect x="260" y="100" width="6" height="6"/>
    <rect x="100" y="140" width="6" height="6"/>
    <rect x="290" y="140" width="6" height="6"/>
  </g>
</svg>