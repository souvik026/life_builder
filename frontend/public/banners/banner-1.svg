<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Leaf pattern - pixel art style -->
  <rect width="400" height="300" fill="#e2efe8"/>
  <!-- Pixel grid leaves -->
  <g fill="#4a7c59" opacity="0.7">
    <rect x="40" y="40" width="20" height="20"/>
    <rect x="60" y="20" width="20" height="20"/>
    <rect x="60" y="40" width="20" height="20"/>
    <rect x="80" y="40" width="20" height="20"/>
    <rect x="60" y="60" width="20" height="20"/>
    <rect x="60" y="80" width="20" height="20"/>
    <rect x="60" y="100" width="20" height="20"/>
  </g>
  <g fill="#2d5e3a" opacity="0.6">
    <rect x="200" y="80" width="20" height="20"/>
    <rect x="220" y="60" width="20" height="20"/>
    <rect x="220" y="80" width="20" height="20"/>
    <rect x="240" y="80" width="20" height="20"/>
    <rect x="220" y="100" width="20" height="20"/>
    <rect x="220" y="120" width="20" height="20"/>
    <rect x="220" y="140" width="20" height="20"/>
  </g>
  <g fill="#7fb08c" opacity="0.5">
    <rect x="300" y="160" width="20" height="20"/>
    <rect x="320" y="140" width="20" height="20"/>
    <rect x="320" y="160" width="20" height="20"/>
    <rect x="340" y="160" width="20" height="20"/>
    <rect x="320" y="180" width="20" height="20"/>
    <rect x="320" y="200" width="20" height="20"/>
    <rect x="320" y="220" width="20" height="20"/>
  </g>
  <g fill="#3d8b63" opacity="0.4">
    <rect x="100" y="180" width="20" height="20"/>
    <rect x="120" y="160" width="20" height="20"/>
    <rect x="120" y="180" width="20" height="20"/>
    <rect x="140" y="180" width="20" height="20"/>
    <rect x="120" y="200" width="20" height="20"/>
    <rect x="120" y="220" width="20" height="20"/>
    <rect x="120" y="240" width="20" height="20"/>
  </g>
  <!-- Scattered pixels -->
  <rect x="280" y="40" width="10" height="10" fill="#4a7c59" opacity="0.3"/>
  <rect x="160" y="260" width="10" height="10" fill="#2d5e3a" opacity="0.3"/>
  <rect x="360" y="260" width="10" height="10" fill="#7fb08c" opacity="0.3"/>
</svg>