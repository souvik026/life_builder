<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Geometric grid - pixel art style -->
  <rect width="400" height="300" fill="#2d5e3a"/>
  <!-- Grid pattern -->
  <g fill="#4a7c59" opacity="0.6">
    <rect x="0" y="0" width="40" height="40"/>
    <rect x="80" y="0" width="40" height="40"/>
    <rect x="160" y="0" width="40" height="40"/>
    <rect x="240" y="0" width="40" height="40"/>
    <rect x="320" y="0" width="40" height="40"/>
    <rect x="40" y="40" width="40" height="40"/>
    <rect x="120" y="40" width="40" height="40"/>
    <rect x="200" y="40" width="40" height="40"/>
    <rect x="280" y="40" width="40" height="40"/>
    <rect x="360" y="40" width="40" height="40"/>
  </g>
  <g fill="#3d8b63" opacity="0.4">
    <rect x="0" y="80" width="40" height="40"/>
    <rect x="80" y="80" width="40" height="40"/>
    <rect x="160" y="80" width="40" height="40"/>
    <rect x="240" y="80" width="40" height="40"/>
    <rect x="320" y="80" width="40" height="40"/>
    <rect x="40" y="120" width="40" height="40"/>
    <rect x="120" y="120" width="40" height="40"/>
    <rect x="200" y="120" width="40" height="40"/>
    <rect x="280" y="120" width="40" height="40"/>
    <rect x="360" y="120" width="40" height="40"/>
  </g>
  <g fill="#7fb08c" opacity="0.3">
    <rect x="0" y="160" width="40" height="40"/>
    <rect x="80" y="160" width="40" height="40"/>
    <rect x="160" y="160" width="40" height="40"/>
    <rect x="240" y="160" width="40" height="40"/>
    <rect x="320" y="160" width="40" height="40"/>
    <rect x="40" y="200" width="40" height="40"/>
    <rect x="120" y="200" width="40" height="40"/>
    <rect x="200" y="200" width="40" height="40"/>
    <rect x="280" y="200" width="40" height="40"/>
    <rect x="360" y="200" width="40" height="40"/>
  </g>
  <g fill="#d0e0d5" opacity="0.2">
    <rect x="0" y="240" width="40" height="40"/>
    <rect x="80" y="240" width="40" height="40"/>
    <rect x="160" y="240" width="40" height="40"/>
    <rect x="240" y="240" width="40" height="40"/>
    <rect x="320" y="240" width="40" height="40"/>
    <rect x="40" y="280" width="40" height="20"/>
    <rect x="120" y="280" width="40" height="20"/>
    <rect x="200" y="280" width="40" height="20"/>
    <rect x="280" y="280" width="40" height="20"/>
    <rect x="360" y="280" width="40" height="20"/>
  </g>
  <!-- Highlight square -->
  <rect x="160" y="120" width="80" height="80" fill="#7fb08c" opacity="0.5" rx="4"/>
  <text x="200" y="168" text-anchor="middle" font-family="monospace" font-size="24" fill="#f0f7f4" opacity="0.8">90</text>
</svg>