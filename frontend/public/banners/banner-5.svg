<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Sunrise horizon - pixel art style -->
  <rect width="400" height="300" fill="#e2efe8"/>
  <!-- Sky with gradient blocks -->
  <rect x="0" y="0" width="400" height="60" fill="#f0f7f4"/>
  <rect x="0" y="60" width="400" height="60" fill="#e2efe8"/>
  <!-- Sun rising -->
  <g fill="#7fb08c" opacity="0.5">
    <rect x="170" y="100" width="60" height="20"/>
    <rect x="160" y="120" width="80" height="20"/>
    <rect x="150" y="140" width="100" height="10"/>
  </g>
  <!-- Sun rays - pixel blocks -->
  <g fill="#7fb08c" opacity="0.2">
    <rect x="190" y="70" width="20" height="30"/>
    <rect x="120" y="100" width="30" height="10"/>
    <rect x="250" y="100" width="30" height="10"/>
    <rect x="130" y="80" width="20" height="20"/>
    <rect x="250" y="80" width="20" height="20"/>
  </g>
  <!-- Horizon line -->
  <rect x="0" y="150" width="400" height="4" fill="#4a7c59" opacity="0.6"/>
  <!-- Ground -->
  <rect x="0" y="154" width="400" height="146" fill="#d0e0d5"/>
  <!-- Ground texture pixels -->
  <g fill="#4a7c59" opacity="0.15">
    <rect x="20" y="170" width="10" height="10"/>
    <rect x="80" y="200" width="10" height="10"/>
    <rect x="150" y="180" width="10" height="10"/>
    <rect x="250" y="220" width="10" height="10"/>
    <rect x="320" y="190" width="10" height="10"/>
    <rect x="370" y="250" width="10" height="10"/>
    <rect x="50" y="260" width="10" height="10"/>
    <rect x="200" y="270" width="10" height="10"/>
  </g>
  <!-- Quote text area hint -->
  <text x="200" y="240" text-anchor="middle" font-family="serif" font-size="14" fill="#4a7c59" opacity="0.4">grow every day</text>
</svg>