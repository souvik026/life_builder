<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Botanical circles - pixel art style -->
  <rect width="400" height="300" fill="#f0f7f4"/>
  <!-- Large circle pattern -->
  <circle cx="100" cy="100" r="60" fill="none" stroke="#d0e0d5" stroke-width="20"/>
  <circle cx="100" cy="100" r="30" fill="#7fb08c" opacity="0.4"/>
  <circle cx="300" cy="80" r="50" fill="none" stroke="#4a7c59" stroke-width="15" opacity="0.3"/>
  <circle cx="300" cy="80" r="20" fill="#2d5e3a" opacity="0.3"/>
  <circle cx="200" cy="200" r="70" fill="none" stroke="#3d8b63" stroke-width="18" opacity="0.25"/>
  <circle cx="200" cy="200" r="35" fill="#4a7c59" opacity="0.2"/>
  <!-- Small decorative circles -->
  <circle cx="50" cy="250" r="15" fill="#7fb08c" opacity="0.3"/>
  <circle cx="350" cy="230" r="25" fill="#d0e0d5" opacity="0.6"/>
  <circle cx="370" cy="40" r="10" fill="#4a7c59" opacity="0.2"/>
  <!-- Pixel dots -->
  <rect x="160" y="50" width="8" height="8" fill="#2d5e3a" opacity="0.3"/>
  <rect x="250" y="260" width="8" height="8" fill="#4a7c59" opacity="0.3"/>
  <rect x="30" y="180" width="8" height="8" fill="#3d8b63" opacity="0.3"/>
</svg>